<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BNL TIMES - Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #000;
            color: white;
            overflow-x: hidden;
        }

        /* EASY EDIT BUTTON */
        .edit-btn {
            position: fixed;
            top: 30px;
            right: 30px;
            background: #ff4757;
            color: white;
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            z-index: 10000;
            box-shadow: 0 10px 30px rgba(255,71,87,0.4);
            transition: all 0.3s;
        }

        .edit-btn:hover {
            transform: scale(1.1);
            background: #ff3742;
        }

        /* SIMPLE EDIT PANEL */
        .edit-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            z-index: 9999;
            transition: right 0.4s ease;
            overflow-y: auto;
        }

        .edit-panel.show {
            right: 0;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .panel-header h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
        }

        .close-panel {
            background: none;
            border: none;
            font-size: 30px;
            color: white;
            cursor: pointer;
        }

        /* UPLOAD BUTTON - SUPER EASY */
        .upload-section {
            background: rgba(255,255,255,0.1);
            border: 3px dashed rgba(255,255,255,0.5);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-section:hover {
            background: rgba(255,255,255,0.2);
            border-color: white;
        }

        .upload-section i {
            font-size: 50px;
            margin-bottom: 20px;
            display: block;
        }

        .upload-section input {
            display: none;
        }

        .text-input {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.9);
        }

        .save-btn {
            width: 100%;
            background: #00b894;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        /* HEADER */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0,0,0,0.9);
            padding: 20px 0;
            z-index: 1000;
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
        }

        .logo {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* HERO */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        .hero p {
            font-size: 1.5rem;
            max-width: 600px;
            margin-bottom: 40px;
        }

        .cta {
            padding: 18px 40px;
            background: #ff6b6b;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .cta:hover {
            background: #ff5252;
            transform: translateY(-3px);
        }

        /* GALLERY */
        .gallery {
            padding: 120px 40px 80px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-title {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            text-align: center;
            margin-bottom: 60px;
        }

        .photos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }

        .photo-item {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: all 0.4s;
            height: 300px;
        }

        .photo-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .photo-item:hover img {
            transform: scale(1.1);
        }

        .photo-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            color: white;
            padding: 25px 20px 20px;
            transform: translateY(100%);
            transition: transform 0.4s;
        }

        .photo-item:hover .photo-overlay {
            transform: translateY(0);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }

        .modal img {
            width: 100%;
            height: auto;
            border-radius: 15px;
        }

        .close-modal {
            position: absolute;
            top: -60px;
            right: 0;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .hero h1 { font-size: 3rem; }
            .gallery-title { font-size: 2.5rem; }
            .photos-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- EASY EDIT BUTTON -->
    <button class="edit-btn" onclick="openEditor()">
        <i class="fas fa-edit"></i>
    </button>

    <!-- SIMPLE EDITOR PANEL -->
    <div class="edit-panel" id="editor">
        <div class="panel-header">
            <h2>✨ BNL TIMES Editor</h2>
            <button class="close-panel" onclick="closeEditor()">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- ADD PHOTOS - 2 CLICKS -->
        <div class="upload-section" onclick="document.getElementById('photoUpload').click()">
            <i class="fas fa-camera"></i>
            <h3>📸 Add Your Photos</h3>
            <p>Click here or drag & drop your pictures</p>
            <input type="file" id="photoUpload" accept="image/*" multiple onchange="addPhotos(this)">
        </div>

        <!-- CHANGE TEXT -->
        <input type="text" class="text-input" id="logoText" placeholder="Logo text (BNL TIMES)" value="BNL TIMES">
        <input type="text" class="text-input" id="heroTitle" placeholder="Hero title" value="Moments That Matter">
        <input type="text" class="text-input" id="heroDesc" placeholder="Hero description" value="Professional Photography">
        <input type="text" class="text-input" id="galleryTitle" placeholder="Gallery title" value="Featured Collection">

        <!-- SAVE BUTTON -->
        <button class="save-btn" onclick="saveChanges()">
            ✅ Save All Changes
        </button>
    </div>

    <!-- HEADER -->
    <header>
        <nav>
            <div class="logo" id="logo">BNL TIMES</div>
        </nav>
    </header>

    <!-- HERO -->
    <section class="hero">
        <h1 id="heroH1">Moments That Matter</h1>
        <p id="heroP">Professional Photography</p>
        <a href="#gallery" class="cta">View Gallery</a>
    </section>

    <!-- GALLERY -->
    <section id="gallery" class="gallery">
        <h1 class="gallery-title" id="galleryH1">Featured Collection</h1>
        <div class="photos-grid" id="photoGrid">
            <!-- YOUR PHOTOS GO HERE -->
        </div>
    </section>

    <!-- PHOTO MODAL -->
    <div id="photoModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <img id="modalImg" src="" alt="">
        </div>
    </div>

    <script>
        // 🔥 EASY PHOTO UPLOAD - WORKS 100%
        function addPhotos(input) {
            const files = input.files;
            const grid = document.getElementById('photoGrid');
            
            for(let i = 0; i < files.length; i++) {
                const file = files[i];
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    const photoDiv = `
                        <div class="photo-item" onclick="showPhoto('${e.target.result}')">
                            <img src="${e.target.result}" alt="Photo ${i+1}">
                            <div class="photo-overlay">
                                <h3>Photo ${i+1}</h3>
                                <p>Click to enlarge</p>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += photoDiv;
                };
                reader.readAsDataURL(file);
            }
            alert(`✅ Added ${files.length} photo(s)!`);
        }

        // SHOW FULL PHOTO
        function showPhoto(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('photoModal').style.display = 'flex';
        }

        // CLOSE MODAL
        function closeModal() {
            document.getElementById('photoModal').style.display = 'none';
        }

        // OPEN EDITOR
        function openEditor() {
            document.getElementById('editor').classList.add('show');
        }

        // CLOSE EDITOR
        function closeEditor() {
            document.getElementById('editor').classList.remove('show');
        }

        // SAVE ALL CHANGES
        function saveChanges() {
            // Update text
            document.getElementById('logo').textContent = document.getElementById('logoText').value;
            document.getElementById('heroH1').textContent = document.getElementById('heroTitle').value;
            document.getElementById('heroP').textContent = document.getElementById('heroDesc').value;
            document.getElementById('galleryH1').textContent = document.getElementById('galleryTitle').value;
            
            closeEditor();
            alert('🎉 All changes saved!');
        }

        // SMOOTH SCROLL
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
</html>
